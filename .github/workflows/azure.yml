name: Build and deploy Node.js app to Azure Web App - Glikemia-CGM

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install and build Nightscout bundle
        env:
          CI: false
        run: |
          npm ci
          npm run bundle

      - name: Pack deployment payload as tar
        run: |
          mkdir -p /tmp/nightscout-package
          tar \
            --exclude-vcs \
            --exclude='.github' \
            --exclude='./site.tgz' \
            -czf /tmp/nightscout-package/site.tgz .

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-package
          path: /tmp/nightscout-package/site.tgz
          archive: false

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged artifact
        uses: actions/download-artifact@v4
        with:
          name: site-package

      - name: Extract package
        run: |
          mkdir package
          tar -xzf site.tgz -C package

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Glikemia-CGM'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: package
